<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaBCI Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f6f7fb; margin:0; }
        .wrap { max-width: 820px; margin: 24px auto; background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); overflow:hidden; }
        .head { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #eee; }
        .title { font-weight:700; }
        .meta { color:#666; font-size:13px; }
        #chatbox { height: 56vh; overflow-y: auto; padding:16px; background:#fcfcff; }
        .msg { margin:10px 0; line-height:1.5; }
        .u { text-align:right; }
        .bubble { display:inline-block; padding:10px 12px; border-radius:10px; max-width:72%; }
        .u .bubble { background:#2f6bff; color:#fff; }
        .a .bubble { background:#eceff7; color:#222; }
        .input { display:flex; gap:8px; padding:12px; border-top:1px solid #eee; }
        textarea { flex:1; resize:none; height:44px; padding:10px; border:1px solid #d8dbe6; border-radius:8px; }
        button { padding:0 16px; border:none; border-radius:8px; background:#2f6bff; color:#fff; cursor:pointer; }
        .emotion { background:#eef4ff; color:#2b4bb8; padding:4px 8px; border-radius:999px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <div>
            <div class="title">MetaBCI 简洁聊天</div>
            <div class="meta">当前用户：{{ username }}</div>
        </div>
        <div class="meta">情绪状态：<span id="emotionText" class="emotion">加载中...</span></div>
    </div>

    <div id="chatbox">
        <div class="msg a"><span class="bubble">你好，我是你的聊天助手。可以和我聊聊你现在的状态。</span></div>
    </div>

    <div class="input">
        <textarea id="userInput" placeholder="输入你的问题..."></textarea>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
const chatbox = document.getElementById('chatbox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const emotionText = document.getElementById('emotionText');

function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'u' : 'a'}`;
    div.innerHTML = `<span class="bubble"></span>`;
    div.querySelector('.bubble').textContent = text;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

async function loadProfile() {
    try {
        const resp = await fetch('/api/profile');
        if (!resp.ok) return;
        const data = await resp.json();
        emotionText.textContent = data.info || '暂无';
    } catch (_) {
        emotionText.textContent = '加载失败';
    }
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    addMsg('user', text);
    userInput.value = '';
    sendBtn.disabled = true;

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await resp.json();
        if (!resp.ok) {
            addMsg('assistant', `请求失败：${data.error || 'unknown error'}`);
        } else {
            addMsg('assistant', data.reply);
        }
    } catch (e) {
        addMsg('assistant', `网络错误：${e.message}`);
    } finally {
        sendBtn.disabled = false;
    }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

loadProfile();
</script>
</body>
</html>
